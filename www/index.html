<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Lab - Web 服务器模拟器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HTML Lab</h1>
            <p>欢迎使用 Web 服务器模拟器</p>
        </header>
        
        <main>
            <section class="intro">
                <h2>项目说明</h2>
                <p>这是一个基于 Django 5 的 Web 服务器模拟器，可以直接读取 www 目录下的 HTML、CSS 和 JavaScript 文件。</p>
            </section>
            
            <section class="features">
                <h2>功能特性</h2>
                <ul>
                    <li>自动解析 HTML 文件</li>
                    <li>支持 CSS 样式</li>
                    <li>支持 JavaScript 交互</li>
                    <li>无需数据库，直接读取文件</li>
                </ul>
            </section>
            
            <section class="demo">
                <h2>交互演示</h2>
                <button id="clickBtn" class="btn">点击我</button>
                <p id="message"></p>
            </section>
        </main>
        
        <footer>
            <p>HTML Lab &copy; 2026 - Django 5 Web Server Simulator</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
